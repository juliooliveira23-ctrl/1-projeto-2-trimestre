<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessibilidade para Baixa Visao</title>
    <style>
        /* Configuracoes Gerais para Baixa Visao - Alto Contraste */
        body {
            background-color: #121212;
            color: #FFFFFF;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #00FFCC;
            text-align: center;
            margin-bottom: 10px;
        }

        p.instrucao {
            font-size: 1.4rem;
            color: #FFFF00;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Container que organiza os cards separados na tela */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            max-width: 1300px;
            width: 100%;
        }

        /* Estrutura de cada Flashcard com espacamento isolado */
        .flashcard {
            background-color: transparent;
            width: 280px;
            height: 280px;
            perspective: 1000px; /* Efeito 3D */
            margin: 20px; /* Garante a separacao fisica entre os cards */
        }

        .flashcard-interno {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            border: 4px solid #00FFCC;
            border-radius: 10px;
        }

        /* Giro de 360 graus no hover ou focus dentro do card */
        .flashcard:hover .flashcard-interno,
        .flashcard:focus-within .flashcard-interno {
            transform: rotateY(360deg);
        }

        /* Faces do Card */
        .face-frente, .face-verso {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Esconde o outro lado durante o giro */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 6px;
        }

        /* Estilo da Frente */
        .face-frente {
            background-color: #1E1E1E;
            color: #00FFCC;
        }

        .face-frente h2 {
            font-size: 1.8rem;
            margin: 0;
        }

        /* Estilo do Verso */
        .face-verso {
            background-color: #00FFCC;
            color: #121212;
            transform: rotateY(360deg); /* Mantem a leitura correta apos girar */
        }

        .face-verso p {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0;
            line-height: 1.5;
        }

        /* Destaque visual amarelo para acessibilidade via teclado */
        .flashcard:focus-within .flashcard-interno {
            border: 6px solid #FFFF00;
        }
    </style>
</head>
<body>

    <h1>Dicas de Acessibilidade para Baixa Visao</h1>
    <p class="instrucao">Passe o mouse ou use o teclado com a tecla Tab para girar o card</p>

    <div class="container">

        <div class="flashcard" tabindex="0" aria-label="Card um: Contraste">
            <div class="flashcard-interno">
                <div class="face-frente">
                    <h2>Contraste
