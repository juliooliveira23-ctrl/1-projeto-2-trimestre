<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Cards Acessibilidade</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#111;
    font-family:Arial, sans-serif;
    display:flex;
    flex-wrap:wrap;
    justify-content:space-evenly;
    align-items:center;
    gap:20px;
    padding:20px;
}

.flash-card{
    width:180px;
    height:180px;
    perspective:1000px;
}

.card{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 1s ease;
    cursor:pointer;
}

.card.flipped{
    transform:rotateY(180deg);
}

.face{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
    font-size:1.3rem;
    font-weight:bold;
}

.front{
    background:#ffd700;
    color:#000;
    border:4px solid #fff;
}

.back{
    background:#005fcc;
    color:#fff;
    transform:rotateY(180deg);
    border:4px solid #fff;
}

.card:focus{
    outline:4px solid #00ff99;
    outline-offset:4px;
}
</style>
</head>

<body>

<div class="flash-card">
    <button class="card" aria-label="Flash card contraste">
        <div class="face front">Contraste</div>
        <div class="face back">Visibilidade</div>
    </button>
</div>

<div class="flash-card">
    <button class="card" aria-label="Flash card ampliacao">
        <div class="face front">Ampliacao</div>
        <div class="face back">Leitura</div>
    </button>
</div>

<div class="flash-card">
    <button class="card" aria-label="Flash card foco">
        <div class="face front">Foco</div>
        <div class="face back">Navegacao</div>
    </button>
</div>

<div class="flash-card">
    <button class="card" aria-label="Flash card tamanho">
        <div class="face front">Texto Grande</div>
        <div class="face back">Acesso</div>
    </button>
</div>

<div class="flash-card">
    <button class="card" aria-label="Flash card cores">
        <div class="face front">Cores</div>
        <div class="face back">Percepcao</div>
    </button>
</div>

<div class="flash-card">
    <button class="card" aria-label="Flash card zoom">
        <div class="face front">Zoom</div>
        <div class="face back">Detalhes</div>
    </button>
</div>

<div class="flash-card">
    <button class="card" aria-label="Flash card leitor">
        <div class="face front">Leitor</div>
        <div class="face back">Apoio</div>
    </button>
</div>

<div class="flash-card">
    <button class="card" aria-label="Flash card teclado">
        <div class="face front">Teclado</div>
        <div class="face back">Controle</div>
    </button>
</div>

<script>
const cards = document.querySelectorAll(".card");

cards.forEach(card => {
    card.addEventListener("click", () => {

        if(card.classList.contains("flipped")) return;

        card.classList.add("flipped");

        setTimeout(() => {
            card.classList.remove("flipped");
        }, 3000);

    });

    card.addEventListener("keydown", (event) => {
        if(event.key === "Enter" || event.key === " "){
            event.preventDefault();
            card.click();
        }
    });
});
</script>

</body>
</html>
